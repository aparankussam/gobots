<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#050505"/>
  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Logo mark -->
  <text x="80" y="110" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="800" font-size="52" fill="#D4532A" letter-spacing="-1">go</text>
  <text x="148" y="110" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="800" font-size="52" fill="#F5F5F5" letter-spacing="-1">bots</text>
  <text x="80" y="140" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="500" font-size="14" fill="#555" letter-spacing="3">AI EXECUTION COMPANY</text>
  <!-- Headline -->
  <text x="80" y="280" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="800" font-size="72" fill="#F5F5F5" letter-spacing="-2">AI systems that</text>
  <text x="80" y="360" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="800" font-size="72" fill="#F5F5F5" letter-spacing="-2">actually get deployed.</text>
  <!-- Sub -->
  <text x="80" y="420" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="400" font-size="28" fill="#CFCFCF">Week 1 → working system. No discovery theatre.</text>
  <!-- Accent rule -->
  <rect x="80" y="490" width="160" height="3" rx="1.5" fill="#D4532A"/>
  <text x="80" y="540" font-family="-apple-system,BlinkMacSystemFont,Inter,sans-serif" font-weight="500" font-size="20" fill="#A3A3A3">gobotsai.com</text>
  <!-- Flow nodes -->
  <rect x="820" y="200" width="90" height="36" rx="8" fill="#0D0D0D" stroke="#D4532A" stroke-width="1" stroke-opacity="0.4"/>
  <text x="865" y="223" font-family="monospace" font-size="11" fill="#D4532A" text-anchor="middle">INPUT</text>
  <line x1="910" y1="218" x2="950" y2="218" stroke="#333" stroke-width="1.5"/>
  <rect x="950" y="200" width="100" height="36" rx="8" fill="#0D0D0D" stroke="#555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1000" y="223" font-family="monospace" font-size="11" fill="#888" text-anchor="middle">GOVERN</text>
  <line x1="1050" y1="218" x2="1090" y2="218" stroke="#333" stroke-width="1.5"/>
  <rect x="1090" y="200" width="90" height="36" rx="8" fill="#0D0D0D" stroke="#555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1135" y="223" font-family="monospace" font-size="11" fill="#888" text-anchor="middle">OUTPUT</text>
</svg>
